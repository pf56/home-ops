apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: updater
  namespace: argocd
spec:
  writeBackConfig:
    method: "git"
  applicationRefs:
    - namePattern: "argocd-image-updater"
      images:
        - alias: "argocdimageupdater"
          imageName: "quay.io/argoprojlabs/argocd-image-updater:v1.2.x"
          manifestTargets:
            helm:
              name: "argocd-image-updater.image.repository"
              tag: "argocd-image-updater.image.tag"
    - namePattern: "sonarr"
      images:
        - alias: "sonarr"
          imageName: "lscr.io/linuxserver/sonarr:4.0.x"
    - namePattern: "radarr"
      images:
        - alias: "radarr"
          imageName: "lscr.io/linuxserver/radarr:6.3.x"
    - namePattern: "sabnzbd"
      images:
        - alias: "sabnzbd"
          imageName: "lscr.io/linuxserver/sabnzbd:5.0.x"
    - namePattern: "continuwuity"
      images:
        - alias: "continuwuity"
          imageName: "forgejo.ellis.link/continuwuation/continuwuity:v26.6.x"
    - namePattern: "jellyfin"
      images:
        - alias: "jellyfin"
          imageName: "jellyfin/jellyfin:10.11.x"
    - namePattern: "omada-controller"
      images:
        - alias: "omadacontroller"
          imageName: "mbentley/omada-controller:6.2.x"
    - namePattern: "paperless"
      images:
        - alias: "paperless"
          imageName: "ghcr.io/paperless-ngx/paperless-ngx:2.20.x"
        - alias: "redis"
          imageName: "docker.io/library/redis:8.x"
          manifestTargets:
            helm:
              name: "redis.image.name"
              tag: "redis.image.tag"
    - namePattern: "vaultwarden"
      images:
        - alias: "vaultwarden"
          imageName: "ghcr.io/dani-garcia/vaultwarden:1.36.x"
    - namePattern: "broadcast-box"
      images:
        - alias: "broadcastbox"
          imageName: "seaduboi/broadcast-box:v2.0.x"
        - alias: "redis"
          imageName: "redis:8.8.x"
          manifestTargets:
            helm:
              name: "redis.image.name"
              tag: "redis.image.tag"
        - alias: "livekit"
          imageName: "livekit/livekit-server:v1.8.x"
          manifestTargets:
            helm:
              name: "livekit.image.name"
              tag: "livekit.image.tag"
    - namePattern: "copyparty"
      images:
        - alias: "copyparty"
          imageName: "ghcr.io/9001/copyparty-ac:1.20.x"
    - namePattern: "livekit"
      images:
        - alias: "livekit"
          imageName: "livekit/livekit-server:v1.9.x"
        - alias: "jwtservice"
          imageName: "ghcr.io/element-hq/lk-jwt-service:0.4.x"
          manifestTargets:
            helm:
              name: "jwtService.image.name"
              tag: "jwtService.image.tag"
    - namePattern: "netbox"
      images:
        - alias: "netbox"
          imageName: "ghcr.io/netbox-community/netbox:v4.0.x"
          manifestTargets:
            helm:
              name: "netbox.image.repository"
              tag: "netbox.image.tag"
    - namePattern: "cert-manager"
      images:
        - alias: "certmanager-controller"
          imageName: "quay.io/jetstack/cert-manager-controller:v1.21.x"
          manifestTargets:
            helm:
              name: "cert-manager.image.repository"
              tag: "cert-manager.image.tag"
        - alias: "certmanager-webhook"
          imageName: "quay.io/jetstack/cert-manager-webhook:v1.21.x"
          manifestTargets:
            helm:
              name: "cert-manager.webhook.image.repository"
              tag: "cert-manager.webhook.image.tag"
        - alias: "certmanager-cainjector"
          imageName: "quay.io/jetstack/cert-manager-cainjector:v1.21.x"
          manifestTargets:
            helm:
              name: "cert-manager.cainjector.image.repository"
              tag: "cert-manager.cainjector.image.tag"
        - alias: "certmanager-acmesolver"
          imageName: "quay.io/jetstack/cert-manager-acmesolver:v1.21.x"
          manifestTargets:
            helm:
              name: "cert-manager.acmesolver.image.repository"
              tag: "cert-manager.acmesolver.image.tag"
        - alias: "certmanager-startupapicheck"
          imageName: "quay.io/jetstack/cert-manager-startupapicheck:v1.21.x"
          manifestTargets:
            helm:
              name: "cert-manager.startupapicheck.image.repository"
              tag: "cert-manager.startupapicheck.image.tag"
