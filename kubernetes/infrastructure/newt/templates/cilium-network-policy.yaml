apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: "egress"
spec:
  endpointSelector:
    matchLabels:
      "app.kubernetes.io/component": newt
  egress:
  - toCIDR:
        - 127.0.0.1/32

  - toEndpoints:
    - matchLabels:
       "k8s:io.kubernetes.pod.namespace": kube-system
       "k8s:k8s-app": kube-dns
    toPorts:
      - ports:
         - port: "53"
           protocol: ANY
        rules:
          dns:
            - matchPattern: "*"
  - toFQDNs:
      - matchName: "pangolin.ext.paulfriedrich.me"

  - toServices:
    - k8sService:
        serviceName: sonarr
        namespace: sonarr
    - k8sService:
        serviceName: broadcast-box
        namespace: broadcast-box
