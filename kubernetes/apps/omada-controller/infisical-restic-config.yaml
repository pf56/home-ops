apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: infisical-restic-config
spec:
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: omada-controller-lep-a
        envSlug: dev
        secretsPath: "/restic"
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: omada-controller

  managedKubeSecretReferences:
    - secretName: restic-config
      secretNamespace: omada-controller
      secretType: Opaque
      creationPolicy: "Owner"
