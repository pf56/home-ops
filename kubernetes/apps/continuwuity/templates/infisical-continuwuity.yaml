---
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalAuth
metadata:
  name: infisical-auth
spec:
  infisicalConnectionRef:
    name: infisical-connection
    namespace: infisical-operator-system
  method: universal
  universal:
    clientIdRef:
      name: infisical-credentials
      namespace: continuwuity
      key: clientId
    clientSecretRef:
      name: infisical-credentials
      namespace: continuwuity
      key: clientSecret
---
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalStaticSecret
metadata:
  name: infisical-continuwuity-config
spec:
  infisicalAuthRef:
    name: infisical-auth
    namespace: continuwuity
  syncOptions:
    refreshInterval: 60s
  sources:
    - projectSlug: continuwuity-rca-b
      environmentSlug: dev
      secretPath: /continuwuity
  targets:
    - name: continuwuity-secrets
      namespace: continuwuity
      kind: Secret
      creationPolicy: Owner
      template:
        engineVersion: v1
        data:
          type: static
          SERVER_NAME: "{{ `{{ .CONTINUWUITY_SERVER_NAME.Value }}` }}"
          WELL_KNOWN_SERVER: "{{ `{{ .CONTINUWUITY_WELL_KNOWN_SERVER.Value }}` }}"
          WELL_KNOWN_CLIENT: "{{ `{{ .CONTINUWUITY_WELL_KNOWN_CLIENT.Value }}` }}"
          MATRIX_RTC_FOCI: |
            [
              { type = "livekit", livekit_service_url = "{{ `{{ .CONTINUWUITY_WELL_KNOWN_LIVEKIT_URL.Value }}` }}" }
            ]
