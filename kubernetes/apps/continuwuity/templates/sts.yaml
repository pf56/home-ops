---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: continuwuity
  labels:
    app: continuwuity
spec:
  replicas: 1
  serviceName: continuwuity
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: continuwuity
  template:
    metadata:
      labels:
        app: continuwuity
    spec:
      securityContext:
        sysctls:
          - name: net.ipv4.ip_unprivileged_port_start
            value: "0"
      containers:
        - name: continuwuity
          image: forgejo.ellis.link/continuwuation/continuwuity@sha256:bca159063481744e0221924a254f8893291264fe253f545cec40b0413794bc7e
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - mountPath: /data
              name: data
              subPath: data
          env:
            - name: CONTINUWUITY_SERVER_NAME
              valueFrom:
                secretKeyRef:
                  name: continuwuity-secrets
                  key: SERVER_NAME
            - name: CONTINUWUITY_WELL_KNOWN__SERVER
              valueFrom:
                secretKeyRef:
                  name: continuwuity-secrets
                  key: WELL_KNOWN_SERVER
            - name: CONTINUWUITY_WELL_KNOWN__CLIENT
              valueFrom:
                secretKeyRef:
                  name: continuwuity-secrets
                  key: WELL_KNOWN_CLIENT
            - name: CONTINUWUITY_MATRIX_RTC__FOCI
              valueFrom:
                secretKeyRef:
                  name: continuwuity-secrets
                  key: MATRIX_RTC_FOCI
            - name: TOKIO_WORKER_THREADS
              value: "2"
            - name: CONTINUWUITY_DATABASE_PATH
              value: "/data/db"
            - name: CONTINUWUITY_DATABASE_BACKEND
              value: "rocksdb"
            - name: CONTINUWUITY_PORT
              value: "80"
            - name: CONTINUWUITY_MAX_REQUEST_SIZE
              value: "20000000"
            - name: CONTINUWUITY_ALLOW_FEDERATION
              value: "true"
            - name: CONTINUWUITY_TRUSTED_SERVERS
              value: '["tchncs.de", "matrix.org"]'
            - name: CONTINUWUITY_ADDRESS
              value: "0.0.0.0"
            - name: CONTINUWUITY_ROCKSDB_PARALLELISM_THREADS
              value: "1"
            - name: CONTINUWUITY_ALLOW_REGISTRATION
              value: "false"
            - name: RUST_LOG
              value: info
          readinessProbe:
            httpGet:
              path: /_matrix/federation/v1/version
              port: http
            periodSeconds: 4
            failureThreshold: 5
          resources:
            requests:
              cpu: "2"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "2048Mi"
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: data
      namespace: continuwuity
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: longhorn
      resources:
        requests:
          storage: 8Gi
