---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: continuwuity-backup
spec:
  sourcePVC: data-continuwuity-0
  trigger:
    schedule: "35 2 * * *"
  restic:
    pruneIntervalDays: 14
    repository: restic-config
    retain:
      daily: 7
      weekly: 4
      monthly: 12
      yearly: 1
    copyMethod: Snapshot
    volumeSnapshotClassName: longhorn

