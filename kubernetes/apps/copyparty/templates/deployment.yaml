---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copyparty
  labels:
    app: copyparty
spec:
  selector:
    matchLabels:
      app: copyparty
  replicas: 1
  template:
    metadata:
      labels:
        app: copyparty
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: copyparty
        image: ghcr.io/9001/copyparty-ac:1.20.12
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 3923
            name: http
            protocol: TCP
        volumeMounts:
          - name: config
            mountPath: /cfg
            subPath: config
          - name: config
            mountPath: /.config/copyparty
            subPath: appData
          - name: data
            mountPath: /w
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: pvc-copyparty-config
        - name: data
          persistentVolumeClaim:
            claimName: pvc-copyparty-data
