---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lk-jwt-service
  labels:
    app: lk-jwt-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lk-jwt-service
  template:
    metadata:
      labels:
        app: lk-jwt-service
    spec:
      containers:
        - name: lk-jwt-service
          image: "ghcr.io/element-hq/lk-jwt-service:0.4.1"
          imagePullPolicy: IfNotPresent
          env:
            - name: LIVEKIT_URL
              valueFrom:
                secretKeyRef:
                  name: livekit-secrets
                  key: LIVEKIT_URL
            - name: LIVEKIT_KEY
              valueFrom:
                secretKeyRef:
                  name: livekit-secrets
                  key: LIVEKIT_MATRIX_KEY
            - name: LIVEKIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: livekit-secrets
                  key: LIVEKIT_MATRIX_TOKEN
            - name: LIVEKIT_FULL_ACCESS_HOMESERVERS
              valueFrom:
                secretKeyRef:
                  name: livekit-secrets
                  key: LIVEKIT_FULL_ACCESS_HOMESERVERS
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
