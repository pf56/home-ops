---
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalAuth
metadata:
  name: infisical-auth
spec:
  infisicalConnectionRef:
    name: infisical-connection
    namespace: infisical-operator-system
  method: universal
  universal:
    clientIdRef:
      name: infisical-credentials
      namespace: vaultwarden
      key: clientId
    clientSecretRef:
      name: infisical-credentials
      namespace: vaultwarden
      key: clientSecret
---
apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalStaticSecret
metadata:
  name: infisical-restic-config
spec:
  infisicalAuthRef:
    name: infisical-auth
    namespace: vaultwarden
  syncOptions:
    refreshInterval: 60s
  sources:
    - projectSlug: vaultwarden-miae
      environmentSlug: dev
      secretPath: /restic
  targets:
    - name: restic-config
      namespace: vaultwarden
      kind: Secret
      creationPolicy: Owner
